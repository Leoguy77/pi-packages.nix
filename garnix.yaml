# Garnix configuration - tells Garnix what to build and cache
# See: https://garnix.io/docs
builds:
  # Build aggregates for all systems (triggers caching)
  - packages.x86_64-linux.all
  - packages.x86_64-linux.tierA
  - packages.aarch64-linux.tierA
  - packages.x86_64-darwin.tierA
  - packages.aarch64-darwin.tierA
  
  # Build individual packages (optional - Garnix can infer from aggregates)
  # - packages.x86_64-linux.pi-pi-rewind
  
  # Build checks if you add them later
  # - checks.x86_64-linux.*
