name: Check & Update Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check

  update-registry:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate registry
        run: node registry/generate.mjs > registry/registry.json.new
      - name: Check for changes
        id: changes
        run: |
          if ! diff -q registry/registry.json registry/registry.json.new &>/dev/null; then
            mv registry/registry.json.new registry/registry.json
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update package registry'
          title: 'chore: update package registry'
          body: |
            Automated registry update from npm.
          branch: bot/update-registry
          delete-branch: true
