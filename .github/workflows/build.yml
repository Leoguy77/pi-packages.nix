# CI: build pi packages + push to Cachix
# Cachix free OSS tier: unlimited storage for public caches.

name: Build & Cache

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # daily rebuild to catch new versions
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        system:
          - x86_64-linux
          # - aarch64-linux    # add when CI runner available
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: pi-packages-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - run: nix build .#packages.${{ matrix.system }}.tierA
