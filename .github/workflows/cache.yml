name: Build and push to Attic cache
on:
  workflow_run:
    workflows: ["Update pi-packages.nix registry"]
    types:
      - completed
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'registry/registry.json'
      - 'packages/**/package-lock.json'

concurrency:
  group: attic-push
  cancel-in-progress: false

env:
  ATTIC_ENDPOINT: https://nix-cache.lsinfra.de
  ATTIC_CACHE: pi-packages
  ATTIC_PUBLIC_KEY: pi-packages:OF+SNU2ALJB8M+cQP/RfFOuKIOMN0w4WiV8k01pvUC4=

jobs:
  build-and-push:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix with Attic substituter
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            substituters = https://cache.nixos.org ${{ env.ATTIC_ENDPOINT }}/${{ env.ATTIC_CACHE }}
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= ${{ env.ATTIC_PUBLIC_KEY }}

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build all packages
        run: |
          nix build .#all --no-link --keep-going \
            --option sandbox false \
            --option max-jobs 4 || true
        timeout-minutes: 60

      - name: Push closure to Attic
        env:
          TOKEN: ${{ secrets.ATTIC_CI_TOKEN }}
        run: |
          ALL_PATH=$(nix build .#all --no-link --print-out-paths 2>/dev/null)
          echo "Pushing closure of: $ALL_PATH"
          nix-store -qR "$ALL_PATH" | \
            nix run nixpkgs#attic-client -- push \
              "$ATTIC_CACHE" --stdin --token "$TOKEN"
        timeout-minutes: 60
