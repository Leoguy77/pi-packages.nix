name: Build and push to Attic cache
on:
  workflow_run:
    workflows: ["Update pi-packages.nix registry"]
    types:
      - completed
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'registry/registry.json'
      - 'packages/**/package-lock.json'

concurrency:
  group: attic-push
  cancel-in-progress: false

env:
  ATTIC_ENDPOINT: https://nix-cache.lsinfra.de
  ATTIC_CACHE: pi-packages
  ATTIC_PUBLIC_KEY: pi-packages:OF+SNU2ALJB8M+cQP/RfFOuKIOMN0w4WiV8k01pvUC4=

jobs:
  build-and-push:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install attic CLI
        run: nix profile install nixpkgs#attic-client

      - name: Configure Nix with Attic substituter
        run: |
          mkdir -p ~/.config/nix
          cat > ~/.config/nix/nix.conf << NIXCONF
          experimental-features = nix-command flakes
          max-jobs = 4
          cores = 0
          sandbox = false
          extra-substituters = ${{ env.ATTIC_ENDPOINT }}/${{ env.ATTIC_CACHE }}
          extra-trusted-public-keys = ${{ env.ATTIC_PUBLIC_KEY }}
          NIXCONF

      - name: Login to Attic
        env:
          TOKEN: ${{ secrets.ATTIC_CI_TOKEN }}
        run: attic login ci "$ATTIC_ENDPOINT" "$TOKEN" --set-default

      - name: Build all packages (skips cached via Attic substituter)
        run: |
          nix build .#all --no-link --keep-going || true
        timeout-minutes: 60

      - name: Push new store paths to Attic
        env:
          TOKEN: ${{ secrets.ATTIC_CI_TOKEN }}
        run: |
          # Get all output paths in one eval, then push each
          nix eval --json '.#packages.x86_64-linux' --apply 'x: builtins.attrValues (builtins.mapAttrs (n: v: v.outPath) x)' 2>/dev/null |
            node -e "
              const {spawnSync}=require('child_process');
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                const paths=JSON.parse(d).filter(p=>p.startsWith('/nix/store/'));
                console.log('Store paths: '+paths.length);
                let p=0;
                for(const path of paths){
                  const push=spawnSync('attic',['push',process.env.ATTIC_CACHE,path,'--token',process.env.TOKEN],{timeout:120000});
                  if(push.status===0)p++;
                }
                console.log('pushed='+p);
              });
            "
        timeout-minutes: 60

      - name: Summary
        run: |
          echo "## Attic Cache Push Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
