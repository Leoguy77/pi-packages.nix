name: Update pi-packages.nix registry
permissions:
  contents: write
  pull-requests: write
  id-token: write
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check

  update-registry:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Update package metadata
        run: node registry/generate.mjs
        env:
          REGISTRY_ONLY: '1'
          CONCURRENCY: '4'
      - name: Generate lockfiles for new Tier B packages
        run: node registry/generate.mjs
        env:
          LOCKS_ONLY: '1'
          CONCURRENCY: '4'
      - name: Clean broken lockfiles
        run: |
          node -e "
            const fs=require('fs'),p=require('path');
            const base='packages';
            fs.readdirSync(base).filter(d=>d!=='.gitkeep').forEach(d=>{
              const lp=p.join(base,d,'package-lock.json');
              if(!fs.existsSync(lp))return;
              const l=JSON.parse(fs.readFileSync(lp,'utf8'));
              const m=Object.entries(l.packages||{}).filter(([pkg,i])=>i.version&&!i.integrity&&pkg!=='');
              if(m.length>0)fs.unlinkSync(lp);
            });
          "
      - name: Compute npmDepsHash for new Tier B packages
        run: |
          node -e "
            const {execSync} = require('child_process');
            const {readFileSync,writeFileSync} = require('fs');
            const r = JSON.parse(readFileSync('registry/registry.json','utf8'));
            const pending = Object.entries(r.packages).filter(([k,v]) =>
              v.tier === 'B' && !v.npmDepsHash && require('fs').existsSync('packages/'+k+'/package-lock.json')
            );
            console.log('Computing npmDepsHash for', pending.length, 'packages');
            let ok = 0;
            for (const [name, entry] of pending) {
              try {
                const out = execSync('nix build .#pi-' + name + ' --no-link 2>&1 || true', { timeout: 300000 });
                const m = out.toString().match(/got:\s*(sha256-\S+)/);
                if (m) { r.packages[name].npmDepsHash = m[1]; ok++; console.log('  OK', name); }
                else { console.log('  SKIP', name, '(no hash in output)'); }
              } catch(e) {
                console.log('  FAIL', name, e.message.slice(0,80));
              }
            }
            console.log('Done:', ok, '/', pending.length, 'hashes');
            writeFileSync('registry/registry.json', JSON.stringify(r, null, 2) + '\n');
          "
      - name: Update README stats
        run: node scripts/update-readme-stats.mjs
      - name: Check for changes
        id: changes
        run: |
          if ! git diff --quiet -- registry/ packages/ README.md; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Push changes to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: update registry and lockfiles'
          git push origin HEAD:main
