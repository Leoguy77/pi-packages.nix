name: Check & Update Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check

  update-registry:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Update package metadata
        run: node registry/generate.mjs
        env:
          REGISTRY_ONLY: '1'
          CONCURRENCY: '4'
      
      - name: Generate lockfiles for new Tier B packages
        run: node registry/generate.mjs
        env:
          LOCKS_ONLY: '1'
          CONCURRENCY: '4'
      
      - name: Regenerate broken lockfiles
        run: node -e "
          const fs=require('fs'),p=require('path');
          const base='packages';
          const dirs=fs.readdirSync(base).filter(d=>d!=='.gitkeep');
          let fixed=0;
          for(const d of dirs){
            const lp=p.join(base,d,'package-lock.json');
            if(!fs.existsSync(lp)) continue;
            const l=JSON.parse(fs.readFileSync(lp,'utf8'));
            const m=Object.entries(l.packages||{}).filter(([pkg,i])=>i.version&&!i.integrity&&pkg!=='');
            if(m.length>0){fs.unlinkSync(lp);fixed++;}
          }
          console.log('Cleaned '+fixed+' broken lockfiles');
        "
      
      - name: Check for changes
        id: changes
        run: |
          if ! git diff --quiet -- registry/ packages/; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update package registry and lockfiles'
          title: 'chore: update package registry and lockfiles'
          body: |
            Automated update from nightly cron:
            - Package metadata refreshed from npm
            - New packages added to registry.json
            - Lockfiles generated for new Tier B packages
            - Broken lockfiles cleaned up

            Stats:
            - Tier A (zero deps): direct unpack
            - Tier B with lockfile: buildNpmPackage (cached)
            - Tier B fallback (no lockfile): inline npm install
          branch: bot/update-registry
          delete-branch: true
